<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DropSport - Alquiler de Equipos Deportivos</title>
  <link rel="stylesheet" href="estilos/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="estilos/cliente.css">
</head>
<body>
  <div class="client-shell" id="clientShell">
    <!-- Top bar -->
    <div class="client-topbar">
      <div class="client-topbar-inner">
        <a class="client-brand" href="/cliente.html"><span>⚽</span> DropSport</a>
        <div class="client-search-box">
          <i class="fa-solid fa-search"></i>
          <input id="clientSearch" type="text" placeholder="Buscar equipos deportivos...">
        </div>
        <div class="client-topbar-actions">
          <button id="clientTheme" class="btn small plain" title="Tema"><i class="fa-solid fa-moon"></i></button>
          <div class="client-user-chip">
            <div class="client-user-avatar" id="userAvatar">U</div>
            <span id="userName">Usuario</span>
          </div>
          <button id="clientLogout" class="btn small outline" title="Salir"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <div class="client-nav">
      <div class="client-nav-inner">
        <button class="client-nav-btn active" data-view="catalog"><i class="fa-solid fa-store"></i> Catálogo</button>
        <button class="client-nav-btn" data-view="myrentals"><i class="fa-solid fa-hand-holding-heart"></i> Mis Alquileres</button>
        <button class="client-nav-btn" data-view="mytickets"><i class="fa-solid fa-ticket"></i> Mis Tickets</button>
      </div>
    </div>

    <!-- Main -->
    <div class="client-main">
      <!-- CATALOG VIEW -->
      <div id="catalogView">
        <div class="client-hero">
          <h1><i class="fa-solid fa-futbol"></i> Alquiler de Equipos Deportivos</h1>
          <p>Encuentra los mejores equipos para tus actividades deportivas. Alquila fácil, rápido y seguro.</p>
          <div class="client-hero-icon"><i class="fa-solid fa-medal"></i></div>
        </div>

        <div class="client-categories" id="catFilters"></div>
        <div class="product-grid" id="productGrid"></div>
      </div>

      <!-- MY RENTALS VIEW -->
      <div id="myRentalsView" class="hidden">
        <h2 class="client-section-title"><i class="fa-solid fa-hand-holding-heart"></i> Mis Alquileres</h2>
        <div class="client-stats" id="rentalStats"></div>
        <div class="rental-list" id="rentalList"></div>
      </div>

      <!-- MY TICKETS VIEW -->
      <div id="myTicketsView" class="hidden">
        <h2 class="client-section-title"><i class="fa-solid fa-ticket"></i> Mis Tickets</h2>
        <div class="client-stats" id="ticketStats"></div>
        <div class="user-ticket-list" id="userTicketList"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer client-footer">
      <div class="footer-grid">
        <div>
          <strong><i class="fa-solid fa-futbol"></i> DropSport</strong>
          <p>Gestión y alquiler de equipos deportivos.</p>
        </div>
        <div class="footer-links">
          <a href="#">Contacto</a>
          <a href="#">Términos</a>
          <a href="#">Ayuda</a>
        </div>
      </div>
    </footer>
  </div>

  <!-- Rental Modal -->
  <div class="client-modal-overlay hidden" id="clientModal">
    <div class="client-modal">
      <button class="client-modal-close" id="clientModalClose"><i class="fa-solid fa-xmark"></i></button>
      <div id="clientModalBody"></div>
    </div>
  </div>

  <script src="cliente.js"></script>
</body>
</html>
