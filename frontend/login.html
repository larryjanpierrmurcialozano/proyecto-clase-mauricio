<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Iniciar sesion - DropSport</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-grid">
      <a class="brand" href="/">
        <span class="brand-icon">&#9917;</span> DropSport
      </a>
      <nav class="nav">
        <a href="register.html" class="btn small outline">Registrarse</a>
        <button id="toggleTheme" class="btn small plain" aria-label="Cambiar tema">&#127769;</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="container">
      <div class="auth-area">
        <div class="card auth-card">
          <h3><i class="fa-solid fa-right-to-bracket"></i> Iniciar sesion</h3>
          <form onsubmit="return false">
            <label>
              <i class="fa-solid fa-envelope"></i> Correo o usuario
              <input id="loginUser" placeholder="tucorreo@ejemplo.com" required>
            </label>
            <label>
              <i class="fa-solid fa-lock"></i> Contrasena
              <input id="loginPass" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required>
            </label>
            <div class="row">
              <label class="remember"><input id="rememberMe" type="checkbox"> Recordarme</label>
            </div>
            <div class="auth-recovery-link">
              <details class="recovery-visual">
                <summary><i class="fa-solid fa-key"></i> Olvidaste tu contrasena?</summary>
                <div class="recovery-visual-body">
                  <label><i class="fa-solid fa-envelope"></i> Correo electronico<input id="recoverEmail" type="email" placeholder="tucorreo@ejemplo.com"></label>
                  <label><i class="fa-solid fa-lock"></i> Nueva contrasena<input id="recoverPass" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"></label>
                  <label><i class="fa-solid fa-lock"></i> Confirmar contrasena<input id="recoverPass2" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"></label>
                  <div class="row">
                    <button id="recoverSubmit" type="button" class="btn small">Actualizar</button>
                    <button id="recoverCancel" type="button" class="btn small outline">Cancelar</button>
                  </div>
                  <div id="recoverError" class="form-error"></div>
                </div>
              </details>
            </div>
            <div class="row" style="margin-top:16px">
              <button id="doLogin" type="button" class="btn"><i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar</button>
              <a href="register.html" class="btn outline"><i class="fa-solid fa-user-plus"></i> Crear cuenta</a>
            </div>
            <div id="loginError" class="form-error"></div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-grid">
      <div>
        <strong><i class="fa-solid fa-futbol"></i> DropSport</strong>
        <p>Gestion y alquiler de equipos deportivos.</p>
      </div>
      <div class="footer-links">
        <a href="#">Contacto</a>
        <a href="#">Terminos</a>
        <a href="#">Ayuda</a>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
